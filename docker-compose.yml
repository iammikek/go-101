services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=app.db
      - API_KEY=dev-key-123
      - PORT=8000

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    environment:
      - CGO_ENABLED=1

volumes:
  go-mod-cache:
